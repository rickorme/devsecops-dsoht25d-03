name: CI/CD Pipeline

on:
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  
  # Automatic triggers
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Weekly schedule: every Sunday at 1:30 AM
  schedule:
    - cron: '30 1 * * 0'

# ============================================================================
# PERMISSIONS
# ============================================================================
# Define what permissions GitHub Actions has
# IMPORTANT: security-events: write is REQUIRED for CodeQL to upload results
# ----------------------------------------------------------------------------
permissions:
  actions: read          # Read workflow files
  contents: read         # Read repository contents
  security-events: write  # Write security results (CodeQL, etc.) - FIXED!

jobs:
  ci:
    # Dynamically name the job based on matrix target
    name: ${{ matrix.target == 'backend' && 'Backend CI' || 'Frontend CI' }}
    runs-on: ubuntu-latest
    
    strategy:
      # Continue other jobs even if one fails
      fail-fast: false
      matrix:
        target: [backend, frontend]

    # ============================================================================
    # SERVICES
    # ============================================================================
    # PostgreSQL database shared between backend and frontend jobs
    # ----------------------------------------------------------------------------
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $$POSTGRES_USER"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ============================================================================
      # COMMON STEPS (run for both backend and frontend)
      # ============================================================================
      
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------------
      # CODEQL INITIALIZATION
      # Note: We initialize CodeQL early, but the actual analysis runs at the end
      # ----------------------------------------------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          # Select language based on matrix target
          languages: ${{ matrix.target == 'backend' && 'python' || 'javascript-typescript' }}
          build-mode: none  # No build needed for Python/JS

      # ----------------------------------------------------------------------------
      # ENVIRONMENT SETUP
      # ----------------------------------------------------------------------------
      
      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"        

      - name: Setup Backend Environment
        run: |
          # Create .env file with database credentials from GitHub Secrets
          touch backend/.env
          
          # Database connection strings
          echo "DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ secrets.DB_NAME }}" >> backend/.env
          echo "TEST_DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ secrets.DB_NAME }}" >> backend/.env          
          
          # Install backend dependencies and run migrations
          make install-backend

      - name: Setup Test Database & Start Backend Server
        run: |
          # Seed database with test data
          make seed-database   
          
          # Start backend server in background
          # Frontend tests need this running
          make run-backend-for-ci

      # ============================================================================
      # BACKEND-SPECIFIC STEPS
      # Only runs when matrix.target == 'backend'
      # ============================================================================
      
      - name: 🐍 Backend - Lint, Format, Security
        if: matrix.target == 'backend'
        run: |
          make lint-backend
          make security-backend

      - name: 🐍 Backend - Run Unit and Integration Tests
        if: matrix.target == 'backend'
        run: make test-backend

      # ============================================================================
      # FRONTEND-SPECIFIC STEPS
      # Only runs when matrix.target == 'frontend'
      # ============================================================================
      
      - name: ⚛️ Frontend - Setup Node.js
        if: matrix.target == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: ⚛️ Frontend - Install Dependencies
        if: matrix.target == 'frontend'
        run: make install-frontend

      - name: ⚛️ Frontend - Security Audit
        if: matrix.target == 'frontend'
        run: make audit-frontend

      - name: ⚛️ Frontend - Lint
        if: matrix.target == 'frontend'
        run: make lint-frontend

      - name: ⚛️ Frontend - Unit Tests (Vitest)
        if: matrix.target == 'frontend'
        run: make test-frontend-unit 

      # ----------------------------------------------------------------------------
      # PLAYWRIGHT SETUP (for E2E tests)
      # Complex caching strategy to speed up CI
      # ----------------------------------------------------------------------------
      
      - name: ⚛️ Frontend - Cache Playwright Browsers
        if: matrix.target == 'frontend'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Cache key based on uv.lock (where Playwright version is defined)
          # FIXED: Was pointing to backend/pyproject.toml before!
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/uv.lock') }}
      
      - name: ⚛️ Frontend - Install Playwright Browsers
        if: >-
          matrix.target == 'frontend' &&
          steps.playwright-cache.outputs.cache-hit != 'true'
        run: make install-playwright

      - name: ⚛️ Frontend - Install Playwright System Dependencies
        if: >-
          matrix.target == 'frontend' &&
          steps.playwright-cache.outputs.cache-hit == 'true'
        run: make install-playwright-deps-only

      - name: ⚛️ Frontend - Run E2E Tests
        if: matrix.target == 'frontend'
        env:
          BASE_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
        run: |
          # Start frontend in background
          make run-frontend & 
          
          # Wait for frontend to be ready (max 120 seconds)
          npx wait-on http://localhost:3000 --timeout 120000
          
          # Verify frontend started successfully
          if [ $? -ne 0 ]; then
            echo "❌ Frontend server failed to start"
            exit 1
          fi
          
          # Run E2E tests
          make test-e2e

      # ============================================================================
      # CLEANUP (runs for both matrix targets)
      # ============================================================================
      
      - name: 🧹 Cleanup background processes
        if: always()  # Run even if previous steps fail
        run: |
          echo "Shutting down background servers..."
          pkill -f "npm" || true   # Kill npm processes
          pkill -f "node" || true   # Kill node processes
          pkill -f "uvicorn" || true # Kill uvicorn (backend)

      # ============================================================================
      # CODEQL ANALYSIS
      # IMPORTANT: This must run AFTER all tests but with proper permissions
      # ============================================================================
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          # Category helps identify which language was analyzed
          category: "/language:${{ matrix.target == 'backend' && 'python' || 'javascript-typescript' }}"
          # FIXED: upload must be 'always', 'never', or 'failure-only'
          # The previous expression ${{ github.repository_owner == github.actor }} was INCORRECT
          upload: always  # Always upload results to GitHub Security tab