services:
  # The Main App Container (VS Code connects to this)
  app:
    shm_size: '2gb' # this helps with running browsers inside the container (the default is just 64mb)
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      # Mount the current folder to /workspace
      - ../:/workspace:cached
    # Keep the container running indefinitely
    command: sleep infinity
    # Connect to the same network as the database
    network_mode: service:db
    depends_on:
      db:
        condition: service_healthy

  # The Development Database Container
  db:
    image: dhi.io/postgres:16
    healthcheck:
      # Hardened images usually still have pg_isready
      test: ["CMD-SHELL", "pg_isready -U user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5433:5432"

  # The Test Database Container
  test_db:
    image: dhi.io/postgres:16
    restart: unless-stopped
    # Use tmpfs to keep the DB in memory for blazing fast tests!
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_db
    ports:
      - "5434:5432" # Exposed on a different port so it doesn't clash with dev DB      
  
  grype:
      image: anchore/grype:latest
      profiles:
        - tools # This hides it from normal startup
      volumes:
        # This is the magic line. It lets the container talk to your host's Docker engine
        - /var/run/docker.sock:/var/run/docker.sock
        # Mount a persistent named volume to that exact directory
        - grype_db_cache:/.cache/grype
        # Optional: Mount your codebase so Grype can also scan raw files if needed
        - ./:/workspace
        
volumes:
  postgres-data:
  grype_db_cache: